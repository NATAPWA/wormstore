<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Червяк — PWA Store без App Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Neucha&display=swap" rel="stylesheet">
    <meta name="mobile-web-app-capable" content="yes">   <!-- новая -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1b5e20">
    <link rel="icon" href="img/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
</head>
<body>
    <header>
        <div style="text-align: center; margin-bottom: 10px;">
    <svg width="80" height="80" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="#4caf50" stroke="#2e7d32" stroke-width="4"/>
        <circle cx="35" cy="40" r="6" fill="white"/>
        <circle cx="65" cy="40" r="6" fill="white"/>
        <circle cx="35" cy="40" r="3" fill="black"/>
        <circle cx="65" cy="40" r="3" fill="black"/>
        <path d="M 40 65 Q 50 75 60 65" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="70" rx="8" ry="4" fill="#ff8a80" transform="rotate(-20 30 70)"/>
    </svg>
</div>
        <h1>🐛 Червяк</h1>
        <p>Магазин приложений без App Store</p>
        <button id="installBtn" class="hidden">Добавить Червяка на экран</button>
    </header>
    <main>
    <div class="app-grid">
        <div class="card" data-app="max">
            <img src="img/max-icon.png" alt="MAX" class="app-icon" onerror="this.src='img/icon-192.png'">
            <h2>MAX</h2>
            <p>Мессенджер VK с уведомлениями (PWA)</p>
            <button class="install-app-btn">Установить</button>
        </div>
        <div class="card" data-app="vk">
            <img src="img/vk-icon.png" alt="VK Мессенджер" class="app-icon" onerror="this.src='img/icon-192.png'">
            <h2>VK Мессенджер</h2>
            <p>Официальный клиент ВКонтакте</p>
            <button class="install-app-btn">Установить</button>
        </div>
    </div>
       <div style="text-align: center; margin: 30px 0;">
    <a href="https://www.donationalerts.com/r/natapwa" target="_blank" class="donate-btn">❤️ Поддержать проект</a>
</div> 
</main>
    <footer>
         <p>🐛 Червяк грызёт яблоко санкций. Народный PWA-магазин.</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
